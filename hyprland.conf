#   в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘  в•ҡв–Ҳв–Ҳв•”в•қ  в–Ҳв–Ҳв•”в•җв•җв•җв•қ в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘     #
#   в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ     #
#   в•ҡв•җв•қ  в•ҡв•җв•қ   в•ҡв•җв•қ   в•ҡв•җв•қ     в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•қ     #
#                                                                             #
#   Arch Linux вҖў Hyprland Config                                             #
#   Optimized for Performance + Aesthetics                                   #
#                                                                             #
###############################################################################
#   Dependencies (install via pacman/yay):
#     hyprland, hyprpaper, waybar, wofi (or rofi-wayland), dunst (or mako)
#     kitty (terminal), swaylock-effects, grim, slurp, wl-clipboard
#     hyprpicker, brightnessctl, pamixer, playerctl
#     nwg-look (GTK theming), xdg-desktop-portal-hyprland
###############################################################################


##############################################################################
# MONITORS
##############################################################################

# Syntax: monitor=name,resolution@refreshrate,position,scale
# Use `hyprctl monitors` to list your monitor names
monitor=,preferred,auto,1                     # Auto-detect all monitors
# monitor=DP-1,2560x1440@165,0x0,1           # Example: primary 165Hz display
# monitor=HDMI-A-1,1920x1080@60,2560x0,1     # Example: secondary to the right


##############################################################################
# AUTO-START (exec-once)
##############################################################################

# Wallpaper daemon
exec-once = hyprpaper

# Status bar
exec-once = waybar

# Notification daemon
exec-once = dunst

# Auth agent (required for GUI sudo prompts)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard manager (keeps clipboard contents after app closes)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# XDG portal (screen sharing, file pickers)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Optional: idle/lock daemon
# exec-once = swayidle -w timeout 300 'swaylock -f' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'

# Optional: NetworkManager applet
# exec-once = nm-applet --indicator

# Optional: Bluetooth applet
# exec-once = blueman-applet


##############################################################################
# ENVIRONMENT VARIABLES
##############################################################################

# Wayland native
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = JAVA_TOOL_OPTIONS,-Dawt.useSystemAAFontSettings=on

# Cursor
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# Toolkit
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1                   # Firefox Wayland

# GPU (uncomment for AMD or NVIDIA)
# env = WLR_DRM_NO_ATOMIC,1                  # AMD: if you have tearing issues
# env = WLR_NO_HARDWARE_CURSORS,1            # NVIDIA: fix invisible cursor
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm


##############################################################################
# INPUT
##############################################################################

input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options = caps:escape              # Remap CapsLock вҶ’ Escape
    kb_rules   =

    follow_mouse    = 1                   # Focus follows mouse
    mouse_refocus   = false

    sensitivity     = 0                   # -1.0 to 1.0 (0 = no change)
    accel_profile   = flat                # flat | adaptive
    force_no_accel  = false

    touchpad {
        natural_scroll    = true
        disable_while_typing = true
        tap-to-click      = true
        drag_lock         = false
        scroll_factor     = 1.0
    }

    repeat_rate  = 50                     # Key repeat rate (chars/sec)
    repeat_delay = 240                    # Delay before key repeat (ms)
}


##############################################################################
# GENERAL
##############################################################################

general {
    gaps_in  = 5                          # Gap between windows
    gaps_out = 10                         # Gap between windows and monitor edge
    border_size = 2

    # Border colors (active / inactive / group active / group inactive)
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg   # Catppuccin purpleвҶ’blue
    col.inactive_border = rgba(313244aa)

    layout = dwindle                      # dwindle | master

    resize_on_border    = true            # Drag window edge to resize
    allow_tearing       = false           # Set true + windowrule for gaming
    no_focus_fallback   = false
}


##############################################################################
# DECORATION (Visuals)
##############################################################################

decoration {
    rounding = 12                         # Corner radius (px)

    # Opacity
    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    # Drop shadow (Updated for v0.40+)
    shadow {
        enabled = true
        range = 20
        render_power = 3
        offset = 0 5
        color = rgba(1a1a2eee)
        color_inactive = rgba(1a1a2e88)
    }

    # Blur (frosted-glass effect)
    blur {
        enabled       = true
        size          = 8
        passes        = 3
        noise         = 0.02
        contrast      = 1.1
        brightness    = 0.9
        xray          = false             # true = blur shows wallpaper through all layers
        # new_optimizations = true        # DEPRECATED: Optimizations are now always on
        vibrancy      = 0.2
        vibrancy_darkness = 0.0
    }

    # Dim inactive windows slightly
    dim_inactive   = true
    dim_strength   = 0.08
    dim_special    = 0.3
}


##############################################################################
# ANIMATIONS
##############################################################################

animations {
    enabled = true

    # Bezier curves
    bezier = smoothOut,  0.36, 0,   0.66, -0.56
    bezier = smoothIn,   0.25, 1,   0.5,  1
    bezier = overshot,   0.05, 0.9, 0.1,  1.05
    bezier = snappy,     0.68,-0.55,0.27, 1.55
    bezier = linear,     0,   0,   1,    1
    bezier = easeOut,    0.16, 1,   0.3,  1

    # Window open/close
    animation = windowsIn,  1, 5,  overshot, slide
    animation = windowsOut, 1, 4,  smoothOut, slide
    animation = windowsMove,1, 4,  easeOut

    # Fade
    animation = fadeIn,     1, 4,  smoothIn
    animation = fadeOut,    1, 4,  smoothOut
    animation = fadeDim,    1, 4,  smoothIn
    animation = fadeSwitch, 1, 5,  smoothIn

    # Borders
    animation = border,       1, 8,  linear
    animation = borderangle,  1, 40, linear, loop   # Animated gradient border

    # Workspaces
    animation = workspaces, 1, 5, overshot, slidevert

    # Special workspace (scratchpad)
    animation = specialWorkspace, 1, 5, overshot, slidefadevert 15%
}


##############################################################################
# LAYOUTS
##############################################################################

dwindle {
    pseudotile          = true            # Win key + P to toggle
    preserve_split      = true            # Stable split direction
    # smart_split         = false         # DEPRECATED
    smart_resizing      = true
    force_split         = 0              # 0=auto, 1=left/top, 2=right/bottom
    use_active_for_splits = true
    special_scale_factor = 0.8
}

master {
    new_status = slave                    # Updated from new_is_master
    special_scale_factor = 0.8
    mfact               = 0.55            # Master area ratio
    # no_gaps_when_only   = false         # DEPRECATED
    orientation         = left
    inherit_fullscreen  = true
}


##############################################################################
# GESTURES (touchpad)
##############################################################################

gestures {
    workspace_swipe            = true
    workspace_swipe_fingers    = 3
    workspace_swipe_distance   = 300
    workspace_swipe_invert     = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_forever    = false
}


##############################################################################
# MISC
##############################################################################

misc {
    disable_hyprland_logo  = true
    disable_splash_rendering = true
    force_default_wallpaper  = -1         # 0=disable, -1=random
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    always_follow_on_dnd     = true
    # layers_hog_keyboard_focus = true    # DEPRECATED: Removed in recent versions
    animate_manual_resizes   = true
    animate_mouse_windowdragging = true
    enable_swallow           = true
    swallow_regex            = ^(kitty|alacritty|foot)$
    focus_on_activate        = false      # Don't steal focus on activation
    # no_direct_scanout      = false      # DEPRECATED: Handled in render block now
    vrr                      = 0          # Variable Refresh Rate: 0=off, 1=on, 2=fullscreen only
    close_special_on_empty   = true
}


##############################################################################
# PERFORMANCE
##############################################################################

render {
    explicit_sync       = 2               # 0=off, 1=on, 2=auto (NVIDIA needs 1)
    explicit_sync_kms   = 2
    direct_scanout      = false           # May improve fullscreen performance
}

opengl {
    nvidia_anti_flicker = true            # Remove if on AMD/Intel
    # force_introspection = 2             # DEPRECATED/Optional, causes issues in new versions
}

cursor {
    sync_gsettings_theme = true
    no_hardware_cursors  = false          # Set true for NVIDIA if cursor invisible
    enable_hyprcursor    = true
    inactive_timeout     = 3             # Hide cursor after 3s inactivity
    warp_on_change_workspace = false
}

debug {
    overlay        = false
    damage_tracking = 2                  # 0=off, 1=monitor, 2=full
}


##############################################################################
# WINDOW RULES
##############################################################################

# Floating windows
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(xdg-desktop-portal)$
windowrulev2 = float, title:^(Picture.in.Picture)$
windowrulev2 = float, class:^(imv)$
windowrulev2 = float, class:^(mpv)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$

# Size / position for floaters
windowrulev2 = size 800 600,  class:^(pavucontrol)$
windowrulev2 = center,        class:^(pavucontrol)$
windowrulev2 = size 900 700,  class:^(blueman-manager)$
windowrulev2 = center,        class:^(blueman-manager)$

# Dialogs
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Confirm)$
windowrulev2 = float, title:^(Question)$
windowrulev2 = center, title:^(Open File)$

# Opacity
windowrulev2 = opacity 0.95 0.85, class:^(kitty)$
windowrulev2 = opacity 0.95 0.85, class:^(Alacritty)$
windowrulev2 = opacity 0.98 0.90, class:^(Code)$
windowrulev2 = opacity 0.98 0.90, class:^(codium)$

# Gaming (no vsync, allow tearing, max performance)
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = immediate, class:^(gamescope)$

# Picture-in-Picture
windowrulev2 = keepaspectratio, title:^(Picture.in.Picture)$
windowrulev2 = pin,             title:^(Picture.in.Picture)$
windowrulev2 = float,           title:^(Picture.in.Picture)$
windowrulev2 = noborder,        title:^(Picture.in.Picture)$
windowrulev2 = size 480 270,    title:^(Picture.in.Picture)$
windowrulev2 = move 100%-490 100%-290, title:^(Picture.in.Picture)$

# Prevent Waybar from being tiled
layerrule = blur, waybar
layerrule = ignorezero, waybar

# Blur on wofi/rofi
layerrule = blur, wofi
layerrule = blur, rofi
layerrule = ignorezero, wofi


##############################################################################
# WORKSPACE RULES
##############################################################################

# Assign apps to specific workspaces
windowrulev2 = workspace 1 silent, class:^(kitty)$
windowrulev2 = workspace 2 silent, class:^(firefox)$
windowrulev2 = workspace 2 silent, class:^(chromium)$
windowrulev2 = workspace 3 silent, class:^(Code)$
windowrulev2 = workspace 4 silent, class:^(discord)$
windowrulev2 = workspace 4 silent, class:^(WebCord)$
windowrulev2 = workspace 5 silent, class:^(Spotify)$
windowrulev2 = workspace 9 silent, class:^(steam)$


##############################################################################
# KEYBINDINGS
##############################################################################

$mod = SUPER
$terminal = kitty
$filemanager = nautilus
$browser = firefox
$menu = wofi --show drun

# в”Җв”Җ Core в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod, Return,       exec, $terminal
bind = $mod, Q,            killactive
bind = $mod, M,            exit
bind = $mod, E,            exec, $filemanager
bind = $mod, B,            exec, $browser
bind = $mod, Space,        exec, $menu
bind = $mod SHIFT, Space,  togglefloating
bind = $mod, F,            fullscreen, 0
bind = $mod SHIFT, F,      fullscreen, 1       # Maximized (no gaps)
bind = $mod, P,            pseudo                # Dwindle pseudotile
bind = $mod, J,            togglesplit
bind = $mod, C,            centerwindow

# в”Җв”Җ Screenshot в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind  = , Print,         exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind  = SHIFT, Print,    exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind  = CTRL, Print,     exec, grim -g "$(slurp)" - | wl-copy

# в”Җв”Җ Color Picker в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod SHIFT, C,     exec, hyprpicker -a

# в”Җв”Җ Clipboard в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod, V,           exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# в”Җв”Җ Screen Lock в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod SHIFT, L,     exec, swaylock

# в”Җв”Җ Focus (vim-style + arrows) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod, h,     movefocus, l
bind = $mod, l,     movefocus, r
bind = $mod, k,     movefocus, u
bind = $mod, j,     movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# в”Җв”Җ Move Windows в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod SHIFT, h,     movewindow, l
bind = $mod SHIFT, l,     movewindow, r
bind = $mod SHIFT, k,     movewindow, u
bind = $mod SHIFT, j,     movewindow, d
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# в”Җв”Җ Resize (submap) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind  = $mod, R, submap, resize
submap = resize
    binde = , h,     resizeactive, -30 0
    binde = , l,     resizeactive,  30 0
    binde = , k,     resizeactive,  0 -30
    binde = , j,     resizeactive,  0  30
    binde = , left,  resizeactive, -30 0
    binde = , right, resizeactive,  30 0
    binde = , up,    resizeactive,  0 -30
    binde = , down,  resizeactive,  0  30
    bind  = , Return, submap, reset
    bind  = , Escape, submap, reset
    bind  = $mod, R,  submap, reset
submap = reset

# в”Җв”Җ Workspaces в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace (keep focus)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move window to workspace (silently / stay on current workspace)
bind = $mod CTRL, 1, movetoworkspacesilent, 1
bind = $mod CTRL, 2, movetoworkspacesilent, 2
bind = $mod CTRL, 3, movetoworkspacesilent, 3

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bind = $mod, Tab,        workspace, e+1
bind = $mod SHIFT, Tab,  workspace, e-1

# Previous workspace
bind = $mod, grave, workspace, previous

# в”Җв”Җ Special Workspace (Scratchpad) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod,       S, togglespecialworkspace, scratch
bind = $mod SHIFT, S, movetoworkspace,        special:scratch

# в”Җв”Җ Mouse в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bindm = $mod, mouse:272, movewindow      # Drag to move
bindm = $mod, mouse:273, resizewindow    # Drag to resize

# в”Җв”Җ Media Keys в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bindel = , XF86AudioRaiseVolume,   exec, pamixer -i 5
bindel = , XF86AudioLowerVolume,   exec, pamixer -d 5
bindl  = , XF86AudioMute,          exec, pamixer -t
bindl  = , XF86AudioMicMute,       exec, pamixer --default-source -t
bindel = , XF86MonBrightnessUp,    exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown,  exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay,          exec, playerctl play-pause
bindl  = , XF86AudioNext,          exec, playerctl next
bindl  = , XF86AudioPrev,          exec, playerctl previous
bindl  = , XF86AudioStop,          exec, playerctl stop

# в”Җв”Җ Hyprland Reload в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind = $mod SHIFT, R, exec, hyprctl reload


