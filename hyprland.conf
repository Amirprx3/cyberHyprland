#  |_|  |_|_|  |_| |_|    \__/     |______|                                   #
#                                                                             #
#  ML4W Inspired Premium Hyprland Config - Production Ready                   #
#  No Errors • Fully Optimized • Ultra Smooth                                 #
###############################################################################

# ── 1. MONITORS ─────────────────────────────────────────────────────────────
# تنظیم خودکار رزولوشن و نرخ نوسازی مانیتورها
monitor=,preferred,auto,1

# ── 2. AUTOSTART ────────────────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# مدیریت کلیپ‌بورد
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── 3. ENVIRONMENT VARIABLES ────────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# پلتفرم‌های GTK و Qt
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# تنظیمات ظاهری کرسر (سازگار با تم‌های مدرن)
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ── 4. INPUT & KEYBOARD ─────────────────────────────────────────────────────
input {
    kb_layout = us,ir
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    mouse_refocus = false
    
    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# ── 5. GENERAL SYSTEM LOOK ──────────────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    
    # رنگ حاشیه فعال (گرادیان جذاب نیون ملایم به سبک ML4W)
    col.active_border = rgba(ff79c6ee) rgba(8be9fdee) 45deg
    col.inactive_border = rgba(44475aaa)

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# ── 6. DECORATION (BLUR & SHADOWS) ──────────────────────────────────────────
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.92

    # افکت شیشه مات (Frosted Glass) بسیار بهینه شده
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    # سینتکس اصلاح‌شده و بدون ارور سایه‌ها برای نسخه‌های جدید
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
        offset = 0 4
    }
}

# ── 7. ML4W ULTRA-SMOOTH ANIMATIONS ─────────────────────────────────────────
animations {
    enabled = true

    # منحنی‌های حرکتی اختصاصی پروژه برای جابجایی فوق‌العاده نرم
    bezier = ml4wDecel, 0.05, 0.9, 0.1, 1.05
    bezier = ml4wOvershot, 0.13, 0.99, 0.29, 1.1
    bezier = ml4wLinear, 0, 0, 1, 1

    animation = windows, 1, 5, ml4wOvershot, popin 85%
    animation = windowsOut, 1, 4, ml4wDecel, popin 85%
    animation = windowsMove, 1, 4, ml4wDecel
    animation = fade, 1, 4, default
    animation = border, 1, 5, ml4wLinear
    animation = borderangle, 1, 30, ml4wLinear, loop
    animation = workspaces, 1, 5, ml4wDecel, slide
}

# ── 8. LAYOUT CONFIGURATIONS ────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    smart_resizing = true
}

master {
    new_status = slave
    mfact = 0.55
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vrr = 1 # فعال‌سازی Variable Refresh Rate برای گیمینگ و روانی مانیتور
}

# ── 9. ADVANCED WINDOW RULES (v2) ───────────────────────────────────────────
# شناور کردن ابزارهای سیستمی و پاپ‌آپ‌ها
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$

# تنظیم سایز و موقعیت پنجره‌های شناور اولیه
windowrulev2 = size 800 500, class:^(pavucontrol)$
windowrulev2 = center, class:^(pavucontrol)$

# اعمال بلور روی کنترل‌سنتر و نوار وضعیت سیستم
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, wofi
layerrule = ignorezero, wofi

# ── 10. KEYBINDINGS (Intuitive & Fast) ──────────────────────────────────────
$mod = SUPER
$terminal = kitty
$filemanager = thunar
$menu = wofi --show drun
$browser = firefox

# کارهای اصلی سیستم
bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive, 
bind = $mod, M, exit, 
bind = $mod, E, exec, $filemanager
bind = $mod, B, exec, $browser
bind = $mod, Space, exec, $menu
bind = $mod SHIFT, Space, togglefloating, 
bind = $mod, F, fullscreen, 0

# جابجایی بین پنجره‌ها (Vim-style + Arrow keys)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# جابجایی سریع بین ورک‌اسپیس‌ها (1 تا 5)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# انتقال پنجره فعال به ورک‌اسپیس دیگر
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# مدیریت کلیپ‌بورد با کلید سوپر + V
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# کنترل پنجره‌ها با کلیک‌های موس
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── 11. HARDWARE MEDIA KEYS ─────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute, exec, pamixer -t
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── 12. RELOAD SYSTEM ───────────────────────────────────────────────────────
bind = $mod SHIFT, R, exec, hyprctl reload
